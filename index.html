var NEXT_VISIT = new Date('2026-04-17T16:00:00Z'); // Apr 17 noon EDT (UTC-4)
function getCountdownParts() {
  var diff = NEXT_VISIT - Date.now();
  if (diff <= 0) return null;
  var s = Math.floor(diff / 1000);
  var d = Math.floor(s / 86400); s -= d * 86400;
  var h = Math.floor(s / 3600); s -= h * 3600;
  var m = Math.floor(s / 60); s -= m * 60;
  return { d: d, h: h, m: m, s: s };
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function startWelcomeCountdown() {
  var el = document.getElementById('nextVisitWelcome');
  if (!el) return;
  function tick() {
    var p = getCountdownParts();
    if (!p) {
      el.innerHTML = '<span class="next-visit-passed">see you soon &#9825;</span>';
      return;
    }
    document.getElementById('nv-d').textContent = p.d;
    document.getElementById('nv-h').textContent = pad(p.h);
    document.getElementById('nv-m').textContent = pad(p.m);
    document.getElementById('nv-s').textContent = pad(p.s);
  }
  tick();
  setInterval(tick, 1000);
}
function injectCountdownWidget(parentEl, suggestions) {
  var widget = document.createElement('div');
  widget.className = 'countdown-widget';

function md(text) {
  var out = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/\*(.*?)\*/g, '<em>$1</em>');
  out = out.replace(/(?<!!)\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  var lines = out.split('\n'), result = [], i = 0;
  while (i < lines.length) {
    var line = lines[i];
    if (line.startsWith('## ')) { result.push({ type:'block', html:'<h3 class="mh">'+line.slice(3)+'</h3>' }); i++; continue; }
    if (line.trim() === '---') { result.push({ type:'block', html:'<hr class="mhr">' }); i++; continue; }
    var imgMatch = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if (imgMatch) {
      result.push({ type:'block', html:'<figure class="chat-img"><img src="'+imgMatch[2]+'" alt="'+imgMatch[1]+'" loading="lazy" onerror="this.parentElement.style.display=\'none\'"></figure>' });
      i++; continue;
    }
    if (line.startsWith('- ')) {
      var items = [];
      while (i < lines.length && lines[i].startsWith('- ')) { items.push('<li>'+lines[i].slice(2)+'</li>'); i++; }
      result.push({ type:'block', html:'<ul class="mul">'+items.join('')+'</ul>' }); continue;
    }
    if (line.trim() === '') { result.push({ type:'break' }); i++; continue; }
    result.push({ type:'text', content:line }); i++;
  }
  var final = [], pBuf = [];
  for (var ri = 0; ri < result.length; ri++) {
    var r = result[ri];
    if (r.type === 'text') { pBuf.push(r.content); }
    else { if (pBuf.length) { final.push('<p>'+pBuf.join('<br>')+'</p>'); pBuf = []; } if (r.type === 'block') final.push(r.html); }
  }
  if (pBuf.length) final.push('<p>'+pBuf.join('<br>')+'</p>');
  return final.join('\n');
}

function streamHTML(element, htmlContent, onDone) {
  var CHAR_DELAY = 8, CURSOR_HTML = '<span class="cursor"></span>';
  var temp = document.createElement('div'); temp.innerHTML = htmlContent;
  var blocks = Array.from(temp.children);
  element.innerHTML = '';
  var blockIdx = 0;
  function nextBlock() {
    if (blockIdx >= blocks.length) { onDone && onDone(); return; }
    var src = blocks[blockIdx++], tag = src.tagName.toLowerCase();
    if (tag === 'hr' || tag === 'figure') { element.appendChild(src.cloneNode(true)); scrollToBottom(); nextBlock(); return; }
    if (tag === 'ul' || tag === 'ol') {
      var listEl = document.createElement(tag);
      if (src.className) listEl.className = src.className;
      element.appendChild(listEl);
      var liSrcs = Array.from(src.children), liIdx = 0;
      function nextLi() {
        if (liIdx >= liSrcs.length) { nextBlock(); return; }
        var liEl = document.createElement('li'); listEl.appendChild(liEl);
        typeTokens(liEl, liSrcs[liIdx++].innerHTML, nextLi);
      }
      nextLi(); return;
    }
    var el = document.createElement(tag);
    if (src.className) el.className = src.className;
    element.appendChild(el); typeTokens(el, src.innerHTML, nextBlock);
  }
  function tokenize(html) {
    var tokens = [], re = /(<[^>]+>)|([^<])/g, m;
    while ((m = re.exec(html)) !== null) tokens.push({ type: m[1] ? 'tag' : 'char', value: m[0] });
    return tokens;
  }
  function typeTokens(el, html, onComplete) {
    var tokens = tokenize(html), i = 0, built = '';
    function step() {
      if (stopRequested) { el.innerHTML = html; onComplete(); return; }
      if (i >= tokens.length) { el.innerHTML = html; scrollToBottom(); onComplete(); return; }
      var tok = tokens[i++]; built += tok.value; el.innerHTML = built + CURSOR_HTML;
      if (tok.type === 'char') { if (i % 8 === 0) scrollToBottom(); wTimeout(step, CHAR_DELAY); }
      else { wTimeout(step, 0); }
    }
    step();
  }
  nextBlock();
}

function getWillNow() {
  var now = new Date();
  var day = now.getDay(), h = now.getHours(), m = now.getMinutes();
  var t = h * 60 + m;
  function between(sh, sm, eh, em) { return t >= sh*60+sm && t < eh*60+em; }
  function fmt(sh, sm) { var a = sh<12?'am':'pm', h12=sh%12||12; return sm===0?h12+a:h12+':'+(sm<10?'0'+sm:sm)+a; }
  var days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  if (day === 0 || day === 6) return 'it\'s '+days[day]+', no classes or commitments. he\'s probably free.';
  var blocks = [{ sh:5,sm:45,eh:7,em:45,name:'at the gym (jmu urec)' }];
  if (day===1) {
    blocks.push({ sh:9,sm:35,eh:10,em:50,name:'in it 313: community projects' });
    blocks.push({ sh:12,sm:30,eh:13,em:15,name:'at the it ambassador meeting' });
    blocks.push({ sh:13,sm:50,eh:15,em:5,name:'in it-480: cloud computing & iac' });
    blocks.push({ sh:15,sm:25,eh:16,em:40,name:'in it 347: interactive computing systems' });
  } else if (day===2||day===4) {
    blocks.push({ sh:9,sm:35,eh:10,em:50,name:day===2?'in it 340: data science and machine learning':'in it 340: data science and machine learning' });
    blocks.push({ sh:11,sm:10,eh:12,em:25,name:'in it 460: advanced cybersecurity' });
    blocks.push({ sh:14,sm:20,eh:15,em:35,name:'in it 311: operating systems administration' });
  } else if (day===3) {
    blocks.push({ sh:9,sm:35,eh:10,em:50,name:'in it 313: community projects' });
    blocks.push({ sh:13,sm:50,eh:15,em:5,name:'in it-480: cloud computing & iac' });
    blocks.push({ sh:15,sm:25,eh:16,em:40,name:'in it 347: interactive computing systems' });
    blocks.push({ sh:17,sm:0,eh:18,em:0,name:'in it 444: capstone design' });
    blocks.push({ sh:18,sm:0,eh:19,em:0,name:'at the madison tech society meeting' });
  } else if (day===5) {
    blocks.push({ sh:8,sm:0,eh:14,em:0,name:'volunteering at rockingham county public schools' });
    blocks.push({ sh:15,sm:30,eh:17,em:0,name:'in a bsi cto + r&d updates meeting' });
  }
  for (var i=0; i<blocks.length; i++) {
    var b = blocks[i];
    if (between(b.sh,b.sm,b.eh,b.em)) {
      var next = null;
      for (var j=i+1; j<blocks.length; j++) { if (blocks[j].sh*60+blocks[j].sm > t) { next=blocks[j]; break; } }
      var s = 'right now he\'s '+b.name+' (until '+fmt(b.eh,b.em)+').';
      if (next) s += '\n\nafter that he\'s got '+next.name+' at '+fmt(next.sh,next.sm)+'.';
      return s;
    }
  }
  var next = null;
  for (var i=0; i<blocks.length; i++) { if (blocks[i].sh*60+blocks[i].sm > t) { next=blocks[i]; break; } }
  if (!next) return 'looks like he\'s done for the day, probably free for the rest of the evening.';
  if (t < 5*60+45) return 'it\'s early '+days[day]+' morning, he\'s probably still asleep. gym starts at 5:45am.';
  return 'no classes right now on '+days[day]+'. next up: '+next.name+' at '+fmt(next.sh,next.sm)+'.';
}

function deliverAutoIntro() {
  showChat();
  setStreaming(true); stopRequested = false;
  var thinking = addThinkingIndicator();
  setTimeout(function() {
    thinking.remove();
    var msgs = document.getElementById('messages');
    var div = document.createElement('div'); div.className = 'msg msg-bot';
    div.innerHTML = botAvatarHTML()+'<div class="msg-body msg-content"></div>';
    msgs.appendChild(div);
    var text = "hey jolene.\n\ni made this for you because i get super busy sometimes, and i wanted you to always have a place with everything about us.\n\nour story, the timeline, every note i've written you, our photos, what's coming next. it's all in the sidebar whenever you want it.\n\ni love you so much.\n\nwill";
    streamHTML(div.querySelector('.msg-content'), md(text), function() {
      setStreaming(false); scrollToBottom();
    });
    scrollToBottom();
  }, 600);
}
function deliverAnswer(qaId) {
  var qa = QA[qaId];
  var answer = typeof qa.answer === 'function' ? qa.answer() : qa.answer;
  var thinking = addThinkingIndicator();
  var delay = 500 + Math.random() * 300;
  setTimeout(function() {
    thinking.remove();
    var msgs = document.getElementById('messages');
    var div = document.createElement('div'); div.className = 'msg msg-bot';
    div.innerHTML = botAvatarHTML()+'<div class="msg-body msg-content"></div>';
    msgs.appendChild(div);
    var contentEl = div.querySelector('.msg-content');
    streamHTML(contentEl, md(answer), function() {
      if (qaId === 'countdown' || qaId === 'visit_details') injectCountdownWidget(contentEl, []);
      setStreaming(false); scrollToBottom();
    });
    scrollToBottom();
  }, delay);
}
function triggerQuestion(id) {
  if (isStreaming) return;
  var qa = QA[id]; if (!qa) return;
  setStreaming(true); stopRequested = false;
  showChat(); setActiveNav(id);
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  // highlight active qchip
  document.querySelectorAll('.qchip').forEach(function(c) { c.classList.remove('active'); });
  var chip = document.querySelector('.qchip[data-qa="'+id+'"]');
  if (chip) chip.classList.add('active');
  addUserMessage(qa.question);
  setTimeout(function() { deliverAnswer(id); }, 40);
}
