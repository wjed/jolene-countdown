var wTimeout;

  wTimeout = function(fn, delay) { var id=++_tid; _tcb[id]=fn; _tw.postMessage({id:id,d:delay}); };

// ── MARKDOWN PARSER ───────────────────────────────────────────
function md(text) {
  var out = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/\*(.*?)\*/g, '<em>$1</em>');
  out = out.replace(/(?<!!)\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  var lines = out.split('\n'), result = [], i = 0;
  while (i < lines.length) {
    var line = lines[i];
    if (line.startsWith('## ')) { result.push({ type:'block', html:'<h3 class="mh">'+line.slice(3)+'</h3>' }); i++; continue; }
    if (line.trim() === '---') { result.push({ type:'block', html:'<hr class="mhr">' }); i++; continue; }
    var imgMatch = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if (imgMatch) {
      result.push({ type:'block', html:'<figure class="chat-img"><img src="'+imgMatch[2]+'" alt="'+imgMatch[1]+'" loading="lazy" onerror="this.parentElement.style.display=\'none\'"></figure>' });
      i++; continue;
    }
    if (line.startsWith('- ')) {
      var items = [];
      while (i < lines.length && lines[i].startsWith('- ')) { items.push('<li>'+lines[i].slice(2)+'</li>'); i++; }
      result.push({ type:'block', html:'<ul class="mul">'+items.join('')+'</ul>' }); continue;
    }
    if (line.trim() === '') { result.push({ type:'break' }); i++; continue; }
    result.push({ type:'text', content:line }); i++;
  }
  var final = [], pBuf = [];
  for (var ri = 0; ri < result.length; ri++) {
    var r = result[ri];
    if (r.type === 'text') { pBuf.push(r.content); }
    else { if (pBuf.length) { final.push('<p>'+pBuf.join('<br>')+'</p>'); pBuf = []; } if (r.type === 'block') final.push(r.html); }
  }
  if (pBuf.length) final.push('<p>'+pBuf.join('<br>')+'</p>');
  return final.join('\n');
}

// ── STREAMING ANIMATION ───────────────────────────────────────
function streamHTML(element, htmlContent, onDone) {
  var CHAR_DELAY = 8, CURSOR_HTML = '<span class="cursor"></span>';
  var temp = document.createElement('div'); temp.innerHTML = htmlContent;
  var blocks = Array.from(temp.children);
  element.innerHTML = '';
  var blockIdx = 0;
  function nextBlock() {
    if (blockIdx >= blocks.length) { onDone && onDone(); return; }
    var src = blocks[blockIdx++], tag = src.tagName.toLowerCase();
    if (tag === 'hr' || tag === 'figure') { element.appendChild(src.cloneNode(true)); scrollToBottom(); nextBlock(); return; }
    if (tag === 'ul' || tag === 'ol') {
      var listEl = document.createElement(tag);
      if (src.className) listEl.className = src.className;
      element.appendChild(listEl);
      var liSrcs = Array.from(src.children), liIdx = 0;
      function nextLi() {
        if (liIdx >= liSrcs.length) { nextBlock(); return; }
        var liEl = document.createElement('li'); listEl.appendChild(liEl);
        typeTokens(liEl, liSrcs[liIdx++].innerHTML, nextLi);
      }
      nextLi(); return;
    }
    var el = document.createElement(tag);
    if (src.className) el.className = src.className;
    element.appendChild(el); typeTokens(el, src.innerHTML, nextBlock);
  }
  function tokenize(html) {
    var tokens = [], re = /(<[^>]+>)|([^<])/g, m;
    while ((m = re.exec(html)) !== null) tokens.push({ type: m[1] ? 'tag' : 'char', value: m[0] });
    return tokens;
  }
  function typeTokens(el, html, onComplete) {
    var tokens = tokenize(html), i = 0, built = '';
    function step() {
      if (stopRequested) { el.innerHTML = html; onComplete(); return; }
      if (i >= tokens.length) { el.innerHTML = html; scrollToBottom(); onComplete(); return; }
      var tok = tokens[i++]; built += tok.value; el.innerHTML = built + CURSOR_HTML;
      if (tok.type === 'char') { if (i % 8 === 0) scrollToBottom(); wTimeout(step, CHAR_DELAY); }
      else { wTimeout(step, 0); }
    }
    step();
  }
  nextBlock();
}

  div.innerHTML = botAvatarHTML()+'<div class="msg-body"><div class="thinking-dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div); scrollToBottom(); return div;
}
function renderSuggestions(ids) {
  var el = document.getElementById('suggestions'); el.innerHTML = '';
  ids.forEach(function(id) {
    if (!QA[id]) return;
    var btn = document.createElement('button'); btn.className = 'suggestion-chip';
    btn.textContent = QA[id].question;
    btn.addEventListener('click', function() { triggerQuestion(id); });
    el.appendChild(btn);
  });
}
function setActiveNav(id) {
  if (activeNavBtn) activeNavBtn.classList.remove('active');
  var btn = document.querySelector('.nav-btn[data-qa="'+id+'"]');
  if (btn) { btn.classList.add('active'); activeNavBtn = btn; }
}
function deliverAnswer(qaId) {
  var qa = QA[qaId];
  var thinking = addThinkingIndicator();
  var delay = 600 + Math.random() * 400;
  setTimeout(function() {
    thinking.remove();
    var msgs = document.getElementById('messages');
    var div = document.createElement('div'); div.className = 'msg msg-bot';
    div.innerHTML = botAvatarHTML()+'<div class="msg-body msg-content"></div>';
    msgs.appendChild(div);
    var contentEl = div.querySelector('.msg-content');
    streamHTML(contentEl, md(qa.answer), function() {
      setStreaming(false); renderSuggestions(qa.suggestions); scrollToBottom();
    });
    scrollToBottom();
  }, delay);
}
function triggerQuestion(id) {
  if (isStreaming) return;
  var qa = QA[id]; if (!qa) return;
  setStreaming(true); stopRequested = false;
  showChat(); setActiveNav(id); renderSuggestions([]);
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
  addUserMessage(qa.question);
  setTimeout(function() { deliverAnswer(id); }, 40);
}
function matchQuestion(input) {
  var lower = input.toLowerCase(), best = null, bestScore = 0;
  KEYWORD_MAP.forEach(function(item) {
    var score = 0;
    item.keys.forEach(function(k) { if (lower.includes(k)) score++; });
    if (score > bestScore) { bestScore = score; best = item.id; }
  });
  return bestScore > 0 ? best : null;
}
function handleSend() {
  var input = document.getElementById('inputText');
  var text = input.value.trim(); if (!text || isStreaming) return;
  input.value = ''; input.style.height = '';
  document.getElementById('sendBtn').disabled = true;
  var matched = matchQuestion(text);
  setStreaming(true); stopRequested = false;
  showChat(); renderSuggestions([]);
  addUserMessage(text);
  if (matched) { setActiveNav(matched); setTimeout(function() { deliverAnswer(matched); }, 40); }
  else {
    var thinking = addThinkingIndicator();
    setTimeout(function() {
      thinking.remove();
      var msgs = document.getElementById('messages');
      var div = document.createElement('div'); div.className = 'msg msg-bot';
      div.innerHTML = botAvatarHTML()+'<div class="msg-body msg-content"></div>';
      msgs.appendChild(div);
      var fallback = "I can answer questions about Will and Jolene — **how they met**, **their timeline**, **notes from Will**, **long distance**, **what's next**, and more. Try one of the suggestions below!";
      streamHTML(div.querySelector('.msg-content'), md(fallback), function() {
        setStreaming(false); renderSuggestions(['about', 'met', 'notes']); scrollToBottom();
      });
      scrollToBottom();
    }, 700);
  }
}
// ── THEME ──────────────────────────────────────────────────────
function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme');
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
// ── INIT ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.prompt-card, .nav-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { triggerQuestion(btn.dataset.qa); });
  });
  document.getElementById('themeBtn').addEventListener('click', toggleTheme);
  document.getElementById('mobileThemeBtn').addEventListener('click', toggleTheme);
  document.getElementById('mobileSidebarBtn').addEventListener('click', function() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('show');
  });
  document.getElementById('sidebarOverlay').addEventListener('click', function() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  });
  var inputText = document.getElementById('inputText');
  var sendBtn = document.getElementById('sendBtn');
  inputText.addEventListener('input', function() {
    inputText.style.height = 'auto';
    inputText.style.height = Math.min(inputText.scrollHeight, 160) + 'px';
    sendBtn.disabled = !inputText.value.trim();
  });
  inputText.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) handleSend(); }
  });
  sendBtn.addEventListener('click', handleSend);
  document.getElementById('stopBtn').addEventListener('click', function() { stopRequested = true; });
});
</script>
</body>
</html>
